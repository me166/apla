Option Explicit
Dim WshShell, fso, scriptDir, vbsPath, batPath
Set WshShell = CreateObject("WScript.Shell")
Set fso = CreateObject("Scripting.FileSystemObject")
vbsPath = WScript.ScriptFullName
scriptDir = fso.GetParentFolderName(vbsPath)
batPath = scriptDir & "\update.bat"
WshShell.Run "cmd /c """"" & batPath & """ """ & vbsPath & """""", 0, False